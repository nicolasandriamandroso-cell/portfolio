<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mood Tracker</title>
    <link rel="stylesheet" href="../../output.css" />
  </head>
  <body
    class="bg-linear-to-r from-blue-500 to-cyan-400 min-h-screen flex items-center justify-center"
  >
    <div class="bg-white p-6 rounded-xl shadow-lg w-80">
      <h1 class="text-2xl font-bold text-cyan-400 text-center mb-4">
        Mood Tracker 😊
      </h1>
      <label for="mood" class="block text-sm font-medium text-gray-700 mb-2"
        >Select your mood</label
      >
      <select
        id="mood"
        class="w-full mb-3 p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
        <option value="">Choisir humeur</option>
        <option>😁 Heureux</option>
        <option>😐 Neutre</option>
        <option>😭 Triste</option>
        <option>😡 En colere</option>
      </select>
      <button
        onclick="saveMood()"
        class="w-full px-2.5 bg-blue-500 text-white py-2 rounded-lg font-semibold hover:bg-blue-600 transition"
      >
        Enregistrer
      </button>
      <ul id="list" class="mt-4 space-x-2"></ul>
    </div>
  </body>
  <script src="./script.js"></script>
</html>
